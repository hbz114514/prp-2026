<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>望远镜指向模拟</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        font-family: "Segoe UI", sans-serif;
      }
      #info {
        position: absolute;
        top: 20px;
        left: 20px;
        background: rgba(0, 0, 0, 0.7);
        color: white;
        padding: 12px 20px;
        border-radius: 8px;
        backdrop-filter: blur(8px);
        pointer-events: none;
        z-index: 10;
        font-size: 14px;
        border-left: 4px solid #ffaa44;
        font-family: monospace;
      }
      #controls {
        position: absolute;
        bottom: 20px;
        left: 20px;
        right: 20px;
        background: rgba(30, 30, 40, 0.85);
        backdrop-filter: blur(10px);
        border-radius: 12px;
        padding: 15px 20px;
        color: white;
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        justify-content: space-between;
        z-index: 20;
        border: 1px solid rgba(255, 255, 255, 0.2);
        pointer-events: auto;
        font-size: 14px;
      }
      .control-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
        background: rgba(0, 0, 0, 0.5);
        padding: 8px 15px;
        border-radius: 8px;
        min-width: 160px;
      }
      .control-group label {
        font-size: 13px;
        font-weight: bold;
        color: #ffaa66;
      }
      input[type="range"] {
        cursor: pointer;
        width: 180px;
      }
      .value-display {
        font-family: monospace;
        font-size: 14px;
        color: #aaffdd;
      }
      .status {
        font-size: 12px;
        color: #ddd;
      }
      /* === 自动化校准弹窗样式 === */
      #calib-modal-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.8);
        z-index: 3000;
        backdrop-filter: blur(5px);
      }
      #calib-modal {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(20, 20, 30, 0.95);
        border: 1px solid #552288;
        border-radius: 12px;
        padding: 25px;
        width: 650px; /* 放大弹窗宽度 */
        max-width: 90vw; /* 适配小屏幕 */
        color: white;
        box-shadow: 0 0 30px rgba(85, 34, 136, 0.5);
      }
      .progress-container {
        width: 100%;
        background: #222;
        border-radius: 8px;
        margin: 20px 0;
        height: 16px;
        overflow: hidden;
        border: 1px solid #444;
      }
      .progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #552288, #aa66ff);
        transition: width 0.3s ease;
      }
      #calib-log {
        font-family: monospace;
        font-size: 12px;
        color: #aaffdd;
        background: #000;
        padding: 10px;
        border-radius: 6px;
        height: 250px; /* 增加日志可视高度 */
        overflow-y: auto;
        overflow-x: auto; /* 允许横向滚动 */
        white-space: pre; /* 强制矩阵数据不换行 */
        margin-bottom: 15px;
      }
      .btn-row {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
      }
      .calib-btn {
        background: #552288;
        color: white;
        border: none;
        padding: 8px 15px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
      }
      .calib-btn:hover {
        background: #7744aa;
      }
      .calib-btn:disabled {
        background: #444;
        cursor: not-allowed;
        color: #888;
      }
      #timeDisplay {
        font-family: monospace;
        font-size: 14px;
        background: #00000080;
        padding: 4px 8px;
        border-radius: 6px;
        text-align: center;
      }
      #top-right-panel {
        position: absolute;
        top: 20px;
        right: 20px;
        background: rgba(30, 30, 40, 0.85);
        backdrop-filter: blur(10px);
        border-radius: 12px;
        padding: 15px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        pointer-events: auto;
        z-index: 20;
        color: white;
        display: flex;
        flex-direction: column;
        gap: 15px;
        width: 28vw; /* 大约占屏幕宽度的四分之一多一点 */
        min-width: 250px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
      }
      #starmap-thumbnail {
        width: 100%;
        aspect-ratio: 16/9;
        object-fit: cover;
        border-radius: 6px;
        background: #000;
        border: 1px solid #777;
        cursor: pointer;
        transition: transform 0.2s;
      }
      #starmap-thumbnail:hover {
        transform: scale(1.02);
        border-color: #aaffdd;
      }
      @media (max-width: 800px) {
        .control-group {
          min-width: 130px;
        }
        input[type="range"] {
          width: 140px;
        }
        #controls {
          flex-direction: column;
          align-items: stretch;
          bottom: 10px;
          left: 10px;
          right: 10px;
        }
      }
      /* === 参数配置面板样式 === */
      #config-toggle-btn {
        position: absolute;
        top: 80px;
        left: 20px;
        background: rgba(30, 30, 40, 0.85);
        color: #ffaa44;
        border: 1px solid rgba(255, 255, 255, 0.2);
        padding: 8px 12px;
        border-radius: 6px;
        cursor: pointer;
        z-index: 30;
        backdrop-filter: blur(8px);
        font-weight: bold;
        transition: all 0.2s;
      }
      #config-toggle-btn:hover {
        background: rgba(50, 50, 60, 0.9);
        border-color: #ffaa44;
      }
      #config-panel {
        position: absolute;
        top: 120px;
        left: -350px; /* 默认隐藏在屏幕左侧外面 */
        width: 280px;
        background: rgba(20, 20, 28, 0.9);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 10px;
        padding: 15px;
        z-index: 25;
        transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        color: #ddd;
        box-shadow: 4px 4px 15px rgba(0, 0, 0, 0.5);
      }
      #config-panel.open {
        left: 20px; /* 展开时的位置 */
      }
      .cfg-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-bottom: 15px;
      }
      .cfg-item {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .cfg-item label {
        font-size: 11px;
        color: #88aaff;
      }
      .cfg-item input {
        background: rgba(0, 0, 0, 0.5);
        border: 1px solid #555;
        color: #fff;
        padding: 4px 6px;
        border-radius: 4px;
        font-family: monospace;
        font-size: 12px;
      }
      #update-params-btn {
        width: 100%;
        background: #335588;
        color: white;
        border: none;
        padding: 8px;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
        transition: background 0.2s;
      }

      #update-params-btn:hover {
        background: #4477aa;
      }
    </style>
  </head>
  <body>
    <div id="info">
      J2000 坐标轴 (红X, 绿Y, 蓝Z) | 橙色箭头: 望远镜指向<br />
      上海闵行区 (31.22°N, 121.48°E) | 向量由本地 API 计算
    </div>

    <button id="config-toggle-btn">⚙️ 系统误差配置</button>

    <div id="config-panel">
      <div
        style="
          font-size: 14px;
          font-weight: bold;
          margin-bottom: 12px;
          color: white;
          border-bottom: 1px solid #444;
          padding-bottom: 6px;
        "
      >
        机械与环境参数覆盖 (rad / deg)
      </div>

      <button
        id="random-params-btn"
        style="
          width: 100%;
          background: #225544;
          color: white;
          border: none;
          padding: 6px;
          border-radius: 4px;
          cursor: pointer;
          font-size: 12px;
          margin-bottom: 10px;
          border: 1px solid #337755;
        "
      >
        🎲 随机生成微小误差
      </button>

      <div class="cfg-grid">
        <div class="cfg-item">
          <label>DELTA (视轴) [rad]</label
          ><input type="number" step="0.001" id="cfg-DELTA" value="0" />
        </div>
        <div class="cfg-item">
          <label>THETA_NP (极轴) [rad]</label
          ><input type="number" step="0.001" id="cfg-THETA_NP" value="0" />
        </div>
        <div class="cfg-item">
          <label>PHI_X (偏航) [rad]</label
          ><input type="number" step="0.001" id="cfg-PHI_X" value="0" />
        </div>
        <div class="cfg-item">
          <label>EPS_X (调平X) [rad]</label
          ><input type="number" step="0.001" id="cfg-EPS_X" value="0" />
        </div>
        <div class="cfg-item">
          <label>PHI_Y (俯仰) [rad]</label
          ><input type="number" step="0.001" id="cfg-PHI_Y" value="0" />
        </div>
        <div class="cfg-item">
          <label>EPS_Y (调平Y) [rad]</label
          ><input type="number" step="0.001" id="cfg-EPS_Y" value="0" />
        </div>
        <div class="cfg-item">
          <label>PHI_Z (横滚) [rad]</label
          ><input type="number" step="0.001" id="cfg-PHI_Z" value="0" />
        </div>
        <div class="cfg-item">
          <label>EPS_Z (方位零点) [rad]</label
          ><input type="number" step="0.001" id="cfg-EPS_Z" value="0" />
        </div>
        <div class="cfg-item" style="grid-column: span 2; margin-top: 5px">
          <label>地理纬度 LAT [deg]</label
          ><input type="number" step="0.01" id="cfg-LAT" value="31.22" />
        </div>
        <div class="cfg-item" style="grid-column: span 2">
          <label>地理经度 LON [deg]</label
          ><input type="number" step="0.01" id="cfg-LON" value="121.48" />
        </div>
      </div>

      <button id="update-params-btn">🚀 应用并覆盖后端参数</button>

      <button
        id="open-calib-btn"
        style="
          width: 100%;
          background: #552288;
          color: white;
          border: none;
          padding: 8px;
          border-radius: 4px;
          cursor: pointer;
          font-weight: bold;
          margin-top: 10px;
          border: 1px solid #7744aa;
        "
      >
        🛰️ 启动自动化标定程序
      </button>
    </div>
    <div id="controls">
      <div class="control-group">
        <label>方位角 Azimuth (0~360°)</label>
        <input
          type="range"
          id="azimuth"
          min="0"
          max="360"
          step="1"
          value="45"
        />
        <span id="azVal" class="value-display">45.0°</span>
      </div>
      <div class="control-group">
        <label>仰角 Altitude (0~90°)</label>
        <input
          type="range"
          id="altitude"
          min="0"
          max="90"
          step="1"
          value="30"
        />
        <span id="altVal" class="value-display">30.0°</span>
      </div>
      <div class="control-group">
        <label>时间偏移 (小时)</label>
        <input
          type="range"
          id="timeOffset"
          min="-12"
          max="12"
          step="0.1"
          value="0"
        />
        <span id="timeVal" class="value-display">0.0 小时</span>
      </div>
      <div class="control-group">
        <label>选择星星指向</label>
        <select id="starSelect">
          <option value="">-- 选择星星 --</option>
        </select>
      </div>
      <div class="control-group">
        <label>当前 UTC 时间</label>
        <div id="timeDisplay" class="value-display">--:--:--</div>
        <div class="status">实时同步 API 计算</div>
      </div>
      <div class="control-group">
        <label>望远镜指向 (J2000)</label>
        <div
          id="pointingVector"
          class="value-display"
          style="font-size: 14px; font-weight: bold"
        >
          x: ---<br />y: ---<br />z: ---
        </div>
        <div class="status" id="apiStatus">✨ API 状态: 等待请求</div>
      </div>
    </div>
    <div id="top-right-panel">
      <div class="control-group" style="background: transparent; padding: 0">
        <label>焦距 Focal Length (mm)</label>
        <div
          style="display: flex; align-items: center; gap: 10px; margin-top: 5px"
        >
          <input
            type="range"
            id="focalLength"
            min="50"
            max="1000"
            step="50"
            value="200"
            style="flex-grow: 1"
          />
          <span id="focalVal" class="value-display">400 mm</span>
        </div>
      </div>
      <div
        class="control-group"
        style="background: transparent; padding: 0; text-align: center"
      >
        <label style="margin-bottom: 5px; display: block"
          >实时星图 (点击全屏放大)</label
        >
        <img id="starmap-thumbnail" src="" alt="等待 API 渲染..." />
      </div>
    </div>
    <div
      id="starmap-overlay"
      style="
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.85);
        z-index: 2000;
        cursor: pointer;
        text-align: center;
      "
    >
      <img
        id="starmap-full"
        src=""
        style="
          position: absolute;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%);
          max-width: 95%;
          max-height: 95%;
          border-radius: 8px;
          border: 2px solid #88aaff;
        "
      />
      <span
        style="
          position: absolute;
          top: 20px;
          right: 40px;
          color: white;
          font-size: 40px;
        "
        >&times;</span
      >
    </div>
    <div id="calib-modal-overlay">
      <div id="calib-modal">
        <h3 style="margin-top: 0; color: #cc88ff">自动化误差标定系统</h3>
        <p style="font-size: 13px; color: #ccc">
          系统将控制望远镜执行正交轨迹扫描，采集 20 个天区数据，并利用 LM
          算法进行高维非线性寻优。
        </p>

        <div class="progress-container">
          <div id="calib-progress" class="progress-bar"></div>
        </div>

        <div id="calib-log">准备就绪。点击下方开始执行。</div>

        <div class="btn-row">
          <button
            id="cancel-calib-btn"
            class="calib-btn"
            style="background: #444"
          >
            取消 / 关闭
          </button>
          <button id="start-calib-btn" class="calib-btn">▶ 开始执行标定</button>
        </div>
      </div>
    </div>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
        }
      }
    </script>

    <script type="module">
      import * as THREE from "three";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";
      import {
        CSS2DRenderer,
        CSS2DObject,
      } from "three/addons/renderers/CSS2DRenderer.js";

      // ... [此处省略中间的 Three.js 场景构建代码，与你原本完全相同] ...
      // 为了确保能运行，我已经将完整的场景代码包含在下方
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x010118);
      scene.fog = new THREE.FogExp2(0x010118, 0.00008);

      const camera = new THREE.PerspectiveCamera(
        45,
        window.innerWidth / window.innerHeight,
        0.1,
        2000,
      );
      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true;
      renderer.setPixelRatio(window.devicePixelRatio);
      document.body.appendChild(renderer.domElement);

      const labelRenderer = new CSS2DRenderer();
      labelRenderer.setSize(window.innerWidth, window.innerHeight);
      labelRenderer.domElement.style.position = "absolute";
      labelRenderer.domElement.style.top = "0px";
      labelRenderer.domElement.style.left = "0px";
      labelRenderer.domElement.style.pointerEvents = "none";
      document.body.appendChild(labelRenderer.domElement);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.05;
      controls.enableZoom = true;
      controls.enablePan = true;
      controls.zoomSpeed = 1.2;
      controls.rotateSpeed = 0.8;

      const ambientLight = new THREE.AmbientLight(0x222222);
      scene.add(ambientLight);
      const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
      dirLight.position.set(5, 10, 7);
      dirLight.castShadow = true;
      scene.add(dirLight);
      const fillLight = new THREE.PointLight(0x4466cc, 0.4);
      fillLight.position.set(-3, 2, -4);
      scene.add(fillLight);
      const backLight = new THREE.PointLight(0xffaa66, 0.3);
      backLight.position.set(0, 0, -5);
      scene.add(backLight);

      const gridHelper = new THREE.GridHelper(20, 20, 0x88aaff, 0x335588);
      gridHelper.position.y = -2.2;
      gridHelper.material.transparent = true;
      gridHelper.material.opacity = 0.25;
      scene.add(gridHelper);

      const textureLoader = new THREE.TextureLoader();
      const earthMap = textureLoader.load(
        "https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg",
      );
      const earthSpecularMap = textureLoader.load(
        "https://threejs.org/examples/textures/planets/earth_specular_2048.jpg",
      );
      const earthNormalMap = textureLoader.load(
        "https://threejs.org/examples/textures/planets/earth_normal_2048.jpg",
      );
      const cloudMap = textureLoader.load(
        "https://threejs.org/examples/textures/planets/earth_clouds_1024.png",
      );

      const earthMaterial = new THREE.MeshPhongMaterial({
        map: earthMap,
        specularMap: earthSpecularMap,
        specular: new THREE.Color("grey"),
        shininess: 5,
        normalMap: earthNormalMap,
        normalScale: new THREE.Vector2(0.8, 0.8),
      });
      const earthGeometry = new THREE.SphereGeometry(2.0, 128, 128);
      const earth = new THREE.Mesh(earthGeometry, earthMaterial);

      const cloudGeometry = new THREE.SphereGeometry(2.01, 128, 128);
      const cloudMaterial = new THREE.MeshPhongMaterial({
        map: cloudMap,
        transparent: true,
        opacity: 0.12,
        blending: THREE.AdditiveBlending,
      });
      const clouds = new THREE.Mesh(cloudGeometry, cloudMaterial);

      const atmosGeometry = new THREE.SphereGeometry(2.08, 64, 64);
      const atmosMaterial = new THREE.MeshPhongMaterial({
        color: 0x88aaff,
        transparent: true,
        opacity: 0.08,
        side: THREE.BackSide,
      });
      const atmosphere = new THREE.Mesh(atmosGeometry, atmosMaterial);
      const earthGroup = new THREE.Group();
      scene.add(earthGroup);
      earthGroup.add(earth);
      earthGroup.add(clouds);
      earthGroup.add(atmosphere);
      earth.rotation.y = Math.PI / 1.5;
      earthGroup.rotation.y = Math.PI;

      const starCount = 8000;
      const starRadius = 380;
      const starPositions = [];
      const starColors = [];
      for (let i = 0; i < starCount; i++) {
        const ra = Math.random() * Math.PI * 2;
        const dec = Math.asin(Math.random() * 2 - 1);
        const x = starRadius * Math.cos(dec) * Math.cos(ra);
        const y = starRadius * Math.sin(dec);
        const z = starRadius * Math.cos(dec) * Math.sin(ra);
        starPositions.push(x, y, z);
        const intensity = 0.5 + Math.random() * 0.8;
        starColors.push(intensity, intensity * 0.9, intensity);
      }
      const starGeometry = new THREE.BufferGeometry();
      starGeometry.setAttribute(
        "position",
        new THREE.BufferAttribute(new Float32Array(starPositions), 3),
      );
      starGeometry.setAttribute(
        "color",
        new THREE.BufferAttribute(new Float32Array(starColors), 3),
      );
      const starMaterial = new THREE.PointsMaterial({
        size: 0.28,
        vertexColors: true,
        transparent: true,
        opacity: 0.9,
        blending: THREE.AdditiveBlending,
      });
      const starsField = new THREE.Points(starGeometry, starMaterial);

      const brightStars = [
        { name: "Sirius", ra: 101.287, dec: -16.716 },
        { name: "Vega", ra: 279.234, dec: 38.784 },
        { name: "Arcturus", ra: 213.915, dec: 19.182 },
      ];
      const starGroup = new THREE.Group();
      starGroup.add(starsField);
      brightStars.forEach((star) => {
        const raRad = (star.ra * Math.PI) / 180;
        const decRad = (star.dec * Math.PI) / 180;
        const x = starRadius * Math.cos(decRad) * Math.cos(raRad);
        const y = starRadius * Math.sin(decRad);
        const z = starRadius * Math.cos(decRad) * Math.sin(raRad);
        const div = document.createElement("div");
        div.textContent = star.name;
        div.style.color = "#ffdd99";
        div.style.fontSize = "14px";
        div.style.fontWeight = "bold";
        div.style.background = "rgba(0,0,0,0.5)";
        div.style.padding = "2px 6px";
        div.style.borderRadius = "12px";
        div.style.border = "1px solid rgba(255,200,100,0.6)";
        const label = new CSS2DObject(div);
        label.position.set(x, y, z);
        starGroup.add(label);
      });
      scene.add(starGroup);

      const nebulaCount = 1500;
      const nebulaPositions = [];
      for (let i = 0; i < nebulaCount; i++) {
        const r = starRadius + (Math.random() - 0.5) * 25;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        const x = r * Math.sin(phi) * Math.cos(theta);
        const y = r * Math.sin(phi) * Math.sin(theta);
        const z = r * Math.cos(phi);
        nebulaPositions.push(x, y, z);
      }
      const nebulaGeo = new THREE.BufferGeometry();
      nebulaGeo.setAttribute(
        "position",
        new THREE.BufferAttribute(new Float32Array(nebulaPositions), 3),
      );
      const nebulaMat = new THREE.PointsMaterial({
        color: 0x88aaff,
        size: 0.09,
        transparent: true,
        opacity: 0.4,
        blending: THREE.AdditiveBlending,
      });
      const nebulae = new THREE.Points(nebulaGeo, nebulaMat);
      starGroup.add(nebulae);

      const axesHelper = new THREE.AxesHelper(starRadius * 1.1);
      starGroup.add(axesHelper);

      let currentArrow = null;

      function updateDirectionVector(x, y, z, time_offset) {
        if (currentArrow) {
          scene.remove(currentArrow);
          if (currentArrow.geometry) currentArrow.geometry.dispose();
          if (currentArrow.material) currentArrow.material.dispose();
        }
        const startPoint = telescopeBody.getWorldPosition(new THREE.Vector3());
        const direction = new THREE.Vector3(x, y, z).normalize();
        direction.applyAxisAngle(new THREE.Vector3(0, 1, 0), Math.PI); // 绕Y轴转180度
        direction.applyAxisAngle(
          new THREE.Vector3(0, 1, 0),
          (time_offset * Math.PI) / 12,
        );
        const length = 8.0;
        const color = 0xff6600;
        const arrow = new THREE.ArrowHelper(
          direction,
          startPoint,
          length,
          color,
          length * 0.15,
          length * 0.1,
        );
        scene.add(arrow);
        currentArrow = arrow;
      }

      const earthStation = new THREE.Group();
      earthGroup.add(earthStation);
      const latDeg = 31.22;
      const lonDeg = 121.48;
      const latRad = (latDeg * Math.PI) / 180;
      const lonRad = (lonDeg * Math.PI) / 180;
      const R_earth = 2.0;
      const posX = R_earth * Math.cos(latRad) * Math.cos(lonRad);
      const posY = R_earth * Math.sin(latRad);
      const posZ = R_earth * Math.cos(latRad) * Math.sin(lonRad);
      earthStation.position.set(posX, posY, posZ);

      const upDir = new THREE.Vector3(posX, posY, posZ).normalize();
      const eastDir = new THREE.Vector3(
        -Math.sin(lonRad),
        0,
        Math.cos(lonRad),
      ).normalize();
      const northDir = new THREE.Vector3(
        -Math.cos(lonRad) * Math.sin(latRad),
        Math.cos(latRad),
        -Math.sin(lonRad) * Math.sin(latRad),
      ).normalize();
      const rotMatrix = new THREE.Matrix4();
      rotMatrix.makeBasis(eastDir, upDir, northDir);
      earthStation.quaternion.setFromRotationMatrix(rotMatrix);

      const basePlate = new THREE.Mesh(
        new THREE.CylinderGeometry(0.22, 0.28, 0.08, 24),
        new THREE.MeshStandardMaterial({
          color: 0xaa8866,
          roughness: 0.4,
          metalness: 0.7,
        }),
      );
      basePlate.position.y = 0;
      basePlate.castShadow = true;
      earthStation.add(basePlate);

      const pedestal = new THREE.Mesh(
        new THREE.CylinderGeometry(0.12, 0.18, 0.35, 16),
        new THREE.MeshStandardMaterial({
          color: 0xccaa88,
          roughness: 0.3,
          metalness: 0.5,
        }),
      );
      pedestal.position.y = 0.2;
      earthStation.add(pedestal);

      const azimuthGroup = new THREE.Group();
      azimuthGroup.position.y = 0.45;
      earthStation.add(azimuthGroup);

      const altitudeGroup = new THREE.Group();
      altitudeGroup.position.y = 0.1;
      azimuthGroup.add(altitudeGroup);

      const telescopeBody = new THREE.Mesh(
        new THREE.CylinderGeometry(0.12, 0.15, 0.65, 24),
        new THREE.MeshStandardMaterial({
          color: 0xddbb99,
          metalness: 0.85,
          roughness: 0.3,
        }),
      );
      telescopeBody.castShadow = true;
      telescopeBody.position.z = 0.4;

      const lens = new THREE.Mesh(
        new THREE.SphereGeometry(0.12, 24, 24),
        new THREE.MeshStandardMaterial({
          color: 0x88aaff,
          emissive: 0x224466,
          emissiveIntensity: 0.3,
        }),
      );
      lens.position.z = 0.7;
      telescopeBody.add(lens);
      altitudeGroup.add(telescopeBody);

      const beamLight = new THREE.SpotLight(0xffaa66, 0.6);
      beamLight.angle = 0.08;
      beamLight.penumbra = 0.3;
      beamLight.distance = 400;
      beamLight.position.set(0, 0, 0.75);
      telescopeBody.add(beamLight);

      const rayPoints = [];
      for (let i = 0; i <= 30; i++)
        rayPoints.push(new THREE.Vector3(0, i * 0.15, 0));
      const rayGeometryLine = new THREE.BufferGeometry().setFromPoints(
        rayPoints,
      );
      const rayLine = new THREE.Line(
        rayGeometryLine,
        new THREE.LineBasicMaterial({ color: 0xffaa55 }),
      );
      telescopeBody.add(rayLine);

      // --- UI 控件绑定 ---
      const azSlider = document.getElementById("azimuth");
      const altSlider = document.getElementById("altitude");
      const focalSlider = document.getElementById("focalLength");
      const timeSlider = document.getElementById("timeOffset");

      const azVal = document.getElementById("azVal");
      const altVal = document.getElementById("altVal");
      const focalVal = document.getElementById("focalVal");
      const timeVal = document.getElementById("timeVal");

      const pointingVectorDiv = document.getElementById("pointingVector");
      const apiStatusSpan = document.getElementById("apiStatus");
      const timeDisplay = document.getElementById("timeDisplay");
      const thumbnailImg = document.getElementById("starmap-thumbnail");
      const fullImg = document.getElementById("starmap-full");

      const API_URL = "http://localhost:5000/pointing";

      // --- 弹窗交互逻辑 ---
      const overlay = document.getElementById("starmap-overlay");
      thumbnailImg.addEventListener("click", () => {
        overlay.style.display = "block";
      });
      overlay.addEventListener("click", () => {
        overlay.style.display = "none";
      });

      // --- 望远镜模型更新 ---
      function updateTelescopeVisual() {
        const az = (parseFloat(azSlider.value) * Math.PI) / 180;
        const alt = ((90 - parseFloat(altSlider.value)) * Math.PI) / 180;
        azimuthGroup.rotation.y = -az;
        altitudeGroup.rotation.x = -alt;
        azVal.innerText = parseFloat(azSlider.value).toFixed(1) + "°";
        altVal.innerText = parseFloat(altSlider.value).toFixed(1) + "°";
        focalVal.innerText = focalSlider.value + " mm";
        timeVal.innerText = parseFloat(timeSlider.value).toFixed(1) + " 小时";
      }

      // --- 系统参数配置面板逻辑 ---
      const configToggleBtn = document.getElementById("config-toggle-btn");
      const configPanel = document.getElementById("config-panel");
      const updateParamsBtn = document.getElementById("update-params-btn");

      // 抽屉开关控制
      configToggleBtn.addEventListener("click", () => {
        configPanel.classList.toggle("open");
      });

      const randomParamsBtn = document.getElementById("random-params-btn");
      if (randomParamsBtn) {
        randomParamsBtn.addEventListener("click", () => {
          // 生成 -0.0100 到 0.0100 之间的随机数
          const randomError = () => (Math.random() * 0.02 - 0.01).toFixed(4);

          document.getElementById("cfg-DELTA").value = randomError();
          document.getElementById("cfg-PHI_X").value = randomError();
          document.getElementById("cfg-PHI_Y").value = randomError();
          document.getElementById("cfg-PHI_Z").value = randomError();
          document.getElementById("cfg-THETA_NP").value = randomError();
          document.getElementById("cfg-EPS_X").value = randomError();
          document.getElementById("cfg-EPS_Y").value = randomError();
          document.getElementById("cfg-EPS_Z").value = randomError();
        });
      }
      // 发送参数给后端
      updateParamsBtn.addEventListener("click", async () => {
        // 收集所有输入框的数据
        const payload = {
          DELTA: parseFloat(document.getElementById("cfg-DELTA").value),
          PHI_X: parseFloat(document.getElementById("cfg-PHI_X").value),
          PHI_Y: parseFloat(document.getElementById("cfg-PHI_Y").value),
          PHI_Z: parseFloat(document.getElementById("cfg-PHI_Z").value),
          THETA_NP: parseFloat(document.getElementById("cfg-THETA_NP").value),
          EPS_X: parseFloat(document.getElementById("cfg-EPS_X").value),
          EPS_Y: parseFloat(document.getElementById("cfg-EPS_Y").value),
          EPS_Z: parseFloat(document.getElementById("cfg-EPS_Z").value),
          LAT: parseFloat(document.getElementById("cfg-LAT").value),
          LON: parseFloat(document.getElementById("cfg-LON").value),
        };

        try {
          updateParamsBtn.innerText = "⏳ 同步中...";
          updateParamsBtn.style.background = "#886622";

          const response = await fetch("http://localhost:5000/update_params", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });

          const data = await response.json();

          if (data.status === "success") {
            updateParamsBtn.innerText = "✅ 后端已覆盖";
            updateParamsBtn.style.background = "#228844";

            // 延迟重置按钮状态，并强制请求一张新星图以反映误差变化
            setTimeout(() => {
              updateParamsBtn.innerText = "🚀 应用并覆盖后端参数";
              updateParamsBtn.style.background = "#335588";
            }, 2000);

            debouncedFetch();
          } else {
            throw new Error(data.message);
          }
        } catch (error) {
          console.error("参数更新失败:", error);
          updateParamsBtn.innerText = "❌ 更新失败";
          updateParamsBtn.style.background = "#aa3333";
          setTimeout(() => {
            updateParamsBtn.innerText = "🚀 应用并覆盖后端参数";
            updateParamsBtn.style.background = "#335588";
          }, 2000);
        }
      });
      // --- API 请求逻辑 ---
      async function fetchAndDisplayVector() {
        const az = parseFloat(azSlider.value);
        const alt = parseFloat(altSlider.value);
        const focal = parseFloat(focalSlider.value);
        const time_offset = parseFloat(timeSlider.value);

        // 向后端发送绝对真实的机械指令和时间偏移
        const url = `${API_URL}?az=${90 - az}&alt=${90 - alt}&focal=${focal}&time_offset=${time_offset}`;

        try {
          apiStatusSpan.innerHTML = `API 状态: 请求中...`;
          apiStatusSpan.style.color = "#ffff00";

          const response = await fetch(url);
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const data = await response.json();

          if (data.status === "ok") {
            const x = data.x.toFixed(5);
            const y = data.y.toFixed(5);
            const z = data.z.toFixed(5);
            pointingVectorDiv.innerHTML = `x: ${x}<br>y: ${y}<br>z: ${z}`;
            apiStatusSpan.innerHTML = `API 状态: 正常 | 视野恒星数: ${data.star_count}`;
            apiStatusSpan.style.color = "#aaffdd";

            updateDirectionVector(data.x, data.y, data.z, time_offset);

            // 更新地球旋转以体现时间变化
            if (data.gmst !== undefined) {
              earthGroup.rotation.y = data.gmst * 360 + Math.PI;
              starGroup.rotation.y = -data.gmst * 360;
            }

            // 更新缩略图和全屏图
            thumbnailImg.src = data.image;
            fullImg.src = data.image;
          } else {
            throw new Error(data.message || "未知错误");
          }
        } catch (error) {
          console.error("API 请求失败:", error);
          apiStatusSpan.innerHTML = `API 不可用 (请启动 integrated_server.py)`;
          apiStatusSpan.style.color = "#ff8888";
        }
      }

      // --- 时钟更新 ---
      function updateClock() {
        const now = new Date();
        const utcStr =
          now.toISOString().replace("T", " ").substring(0, 19) + " UTC";
        timeDisplay.textContent = utcStr;
      }

      // --- 防抖动算法 (Debounce) ---
      let fetchTimeout = null;
      function debouncedFetch() {
        clearTimeout(fetchTimeout);
        fetchTimeout = setTimeout(() => {
          fetchAndDisplayVector();
        }, 400); // 延迟400毫秒
      }

      // --- 滑块事件监听 ---
      azSlider.addEventListener("input", () => {
        updateTelescopeVisual();
        debouncedFetch();
      });

      altSlider.addEventListener("input", () => {
        updateTelescopeVisual();
        debouncedFetch();
      });

      focalSlider.addEventListener("input", () => {
        updateTelescopeVisual(); // 更新显示的数值
        debouncedFetch();
      });

      timeSlider.addEventListener("input", () => {
        updateTelescopeVisual();
        debouncedFetch();
      });

      starSelect.addEventListener("change", () => {
        const selected = starSelect.value;
        if (selected) {
          const { ra, dec } = JSON.parse(selected);
          const time_offset = parseFloat(timeSlider.value);
          fetch(
            `${API_URL.replace("pointing", "inverse")}?ra=${ra}&dec=${dec}&time_offset=${time_offset}`,
          )
            .then((response) => response.json())
            .then((data) => {
              azSlider.value = data.az;
              altSlider.value = data.alt;
              updateTelescopeVisual();
              debouncedFetch();
            });
        }
      });

      // --- 初始化执行 ---
      setInterval(updateClock, 1000);
      updateClock();
      updateTelescopeVisual();
      fetchAndDisplayVector(); // 初始加载第一张星图

      // 加载星星列表
      fetch("http://localhost:5000/stars")
        .then((response) => {
          if (!response.ok)
            throw new Error(`Network response was not ok: ${response.status}`);
          return response.json();
        })
        .then((data) => {
          console.log("Stars data:", data);
          starSelect.innerHTML = '<option value="">-- 选择星星 --</option>';
          data.forEach((star) => {
            console.log("Adding option:", star.name);
            const option = document.createElement("option");
            option.value = JSON.stringify({ ra: star.ra, dec: star.dec });
            option.textContent = star.name;
            starSelect.appendChild(option);
          });
          console.log(
            "Options added, select length:",
            starSelect.options.length,
          );
        })
        .catch((error) => console.error("Error loading stars:", error));

      // --- 相机初始化 ---
      const shanghaiPos = new THREE.Vector3(posX, posY, posZ);
      const cameraOffset = new THREE.Vector3(3, 2, 4);
      camera.position.copy(shanghaiPos.clone().add(cameraOffset));
      camera.lookAt(shanghaiPos);
      controls.target.copy(shanghaiPos);

      // --- 渲染循环 ---
      function animate() {
        requestAnimationFrame(animate);
        const breath = 0.4 + Math.sin(Date.now() * 0.003) * 0.2;
        beamLight.intensity = breath;
        controls.update();
        renderer.render(scene, camera);
        labelRenderer.render(scene, camera);
      }
      animate();

      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
      });
      // --- 自动化标定系统逻辑 ---
      const openCalibBtn = document.getElementById("open-calib-btn");
      const calibOverlay = document.getElementById("calib-modal-overlay");
      const cancelCalibBtn = document.getElementById("cancel-calib-btn");
      const startCalibBtn = document.getElementById("start-calib-btn");
      const progressBar = document.getElementById("calib-progress");
      const calibLog = document.getElementById("calib-log");

      // 打开和关闭弹窗
      openCalibBtn.addEventListener(
        "click",
        () => (calibOverlay.style.display = "block"),
      );
      cancelCalibBtn.addEventListener("click", () => {
        calibOverlay.style.display = "none";
        // 重置 UI
        progressBar.style.width = "0%";
        calibLog.innerHTML = "准备就绪。点击下方开始执行。";
        startCalibBtn.disabled = false;
      });

      function addLog(text) {
        calibLog.innerHTML += `<div>> ${text}</div>`;
        calibLog.scrollTop = calibLog.scrollHeight;
      }

      startCalibBtn.addEventListener("click", () => {
        startCalibBtn.disabled = true;
        cancelCalibBtn.disabled = true;
        progressBar.style.width = "0%";
        calibLog.innerHTML = "";
        addLog("正在初始化数字孪生定姿系统...");

        // 建立 Server-Sent Events (SSE) 连接
        const eventSource = new EventSource(
          "http://localhost:5000/run_calibration",
        );

        eventSource.onmessage = function (event) {
          const data = JSON.parse(event.data);
          progressBar.style.width = data.progress + "%";
          addLog(data.msg);

          if (data.progress === 100) {
            eventSource.close();
            cancelCalibBtn.disabled = false;
            cancelCalibBtn.innerText = "完成";

            addLog("--------------------------------");
            addLog(
              `✅ 综合指向残差: <span style="color:#ff5555">${data.error_arcsec.toFixed(4)} 角秒</span>`,
            );

            // 打印 8 项参数对比
            addLog("<br><i>[参数比对] (设定值 vs 解算值):</i>");
            const pNames = [
              "DELTA",
              "PHI_X",
              "PHI_Y",
              "PHI_Z",
              "THETA_NP",
              "EPS_X",
              "EPS_Y",
              "EPS_Z",
            ];
            for (let i = 0; i < 8; i++) {
              let diff = Math.abs(data.true_params[i] - data.solved[i]).toFixed(
                6,
              );
              let trueVal = data.true_params[i].toFixed(6);
              let solVal = data.solved[i].toFixed(6);
              addLog(`${pNames[i]}: ${trueVal} vs ${solVal} (Δ: ${diff})`);
            }

            // 打印 3x3 旋转矩阵比对
            addLog("\n[闭环矩阵比对] (R_true vs R_sol):");
            for (let row = 0; row < 3; row++) {
              // 直接使用 padStart 填充标准空格，去掉 replace 替换
              let r_t = data.r_true[row]
                .map((v) => v.toFixed(5).padStart(9, " "))
                .join(", ");
              let r_s = data.r_sol[row]
                .map((v) => v.toFixed(5).padStart(9, " "))
                .join(", ");
              addLog(`[ ${r_t} ] | [ ${r_s} ]`);
            }
            addLog(
              "\n结论：存在线性耦合的参数单项会有偏差，但最终生成的空间旋转矩阵高度等效一致。",
            );
          }
        };

        eventSource.onerror = function () {
          addLog("<span style='color:red'>连接中断或发生错误。</span>");
          eventSource.close();
          cancelCalibBtn.disabled = false;
        };
      });
      console.log("前端启动 | 等待 API 服务 http://localhost:5000");
    </script>
  </body>
</html>
